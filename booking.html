<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Vehicle - DriveNow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="bi bi-car-front-fill"></i> DriveNow
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="vehicles.html">Vehicles</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="booking-history.html">My Bookings</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-outline-light btn-sm" href="customer-login.html">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </a>
                    </li>
                    <li class="nav-item ms-2">
                        <a class="btn btn-primary btn-sm" href="customer-register.html">
                            <i class="bi bi-person-plus"></i> Register
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg">
                    <div class="card-body p-4">
                        <h3 class="fw-bold mb-4">Complete Your Booking</h3>

                        <div id="vehicleSummary" class="mb-4">
                            <div class="text-center py-3">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </div>
                        </div>

                        <div id="bookingAlert" class="alert d-none" role="alert"></div>

                        <form id="bookingForm">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="startDate" class="form-label">Start Date</label>
                                    <input type="date" class="form-control" id="startDate" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="endDate" class="form-label">End Date</label>
                                    <input type="date" class="form-control" id="endDate" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="pickupLocation" class="form-label">Pickup Location</label>
                                <input type="text" class="form-control" id="pickupLocation" placeholder="Enter pickup address" required>
                            </div>

                            <div class="mb-4">
                                <label for="notes" class="form-label">Additional Notes (Optional)</label>
                                <textarea class="form-control" id="notes" rows="3" placeholder="Any special requests?"></textarea>
                            </div>

                            <div class="card bg-light mb-4">
                                <div class="card-body">
                                    <h5 class="card-title">Booking Summary</h5>
                                    <div class="d-flex justify-content-between mb-2">
                                        <span>Number of Days:</span>
                                        <strong id="numberOfDays">0</strong>
                                    </div>
                                    <div class="d-flex justify-content-between mb-2">
                                        <span>Price per Day:</span>
                                        <strong id="pricePerDay">₹0</strong>
                                    </div>
                                    <hr>
                                    <div class="d-flex justify-content-between">
                                        <h5>Total Cost:</h5>
                                        <h5 class="text-primary" id="totalCost">₹0</h5>
                                    </div>
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check-circle"></i> Confirm Booking
                                </button>
                                <a href="vehicles.html" class="btn btn-outline-secondary">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/navbar-auth.js"></script>
    <script>
        let currentVehicle = null;

        document.addEventListener('DOMContentLoaded', async function() {
            if (!isAuthenticated()) {
                showLoginPrompt();
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const vehicleId = urlParams.get('id');

            if (!vehicleId) {
                window.location.href = 'vehicles.html';
                return;
            }

            try {
                currentVehicle = await getVehicleById(vehicleId);
                displayVehicleSummary(currentVehicle);
                setupBookingForm();
            } catch (error) {
                console.error('Error loading vehicle:', error);
                document.getElementById('vehicleSummary').innerHTML = `
                    <div class="alert alert-danger">
                        Failed to load vehicle details. Please try again.
                    </div>
                `;
            }
        });

        function showLoginPrompt() {
            const urlParams = new URLSearchParams(window.location.search);
            const vehicleId = urlParams.get('id');
            const returnUrl = vehicleId ? `booking.html?id=${vehicleId}` : 'vehicles.html';

            document.querySelector('.container.py-5.mt-5').innerHTML = `
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card shadow-sm text-center">
                            <div class="card-body py-5">
                                <i class="bi bi-lock-fill text-primary" style="font-size: 4rem;"></i>
                                <h3 class="mt-4 mb-3">Login Required</h3>
                                <p class="text-muted mb-4">Please login to continue with your booking.</p>
                                <div class="d-grid gap-2 col-md-8 mx-auto">
                                    <a href="customer-login.html?return=${encodeURIComponent(returnUrl)}" class="btn btn-primary btn-lg">
                                        <i class="bi bi-box-arrow-in-right"></i> Login
                                    </a>
                                    <a href="customer-register.html?return=${encodeURIComponent(returnUrl)}" class="btn btn-outline-primary">
                                        <i class="bi bi-person-plus"></i> Create Account
                                    </a>
                                    <a href="vehicles.html" class="btn btn-link">
                                        <i class="bi bi-arrow-left"></i> Back to Vehicles
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function displayVehicleSummary(vehicle) {
            document.getElementById('vehicleSummary').innerHTML = `
                <div class="card bg-light">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-2 text-center">
                                <i class="bi bi-car-front display-4 text-primary"></i>
                            </div>
                            <div class="col-md-10">
                                <h5 class="mb-1">${vehicle.brand} ${vehicle.model}</h5>
                                <p class="text-muted mb-0">${vehicle.type} • ₹${vehicle.pricePerDay}/day</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('pricePerDay').textContent = '₹' + vehicle.pricePerDay;
        }

        function setupBookingForm() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').min = today;
            document.getElementById('endDate').min = today;

            document.getElementById('startDate').addEventListener('change', calculateTotal);
            document.getElementById('endDate').addEventListener('change', calculateTotal);

            document.getElementById('bookingForm').addEventListener('submit', handleBookingSubmit);
        }

        function calculateTotal() {
            const startDate = new Date(document.getElementById('startDate').value);
            const endDate = new Date(document.getElementById('endDate').value);

            if (startDate && endDate && endDate >= startDate) {
                const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
                const total = days * currentVehicle.pricePerDay;

                document.getElementById('numberOfDays').textContent = days;
                document.getElementById('totalCost').textContent = '₹' + total;
            } else {
                document.getElementById('numberOfDays').textContent = '0';
                document.getElementById('totalCost').textContent = '₹0';
            }
        }

        async function handleBookingSubmit(e) {
            e.preventDefault();

            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const pickupLocation = document.getElementById('pickupLocation').value;
            const notes = document.getElementById('notes').value;

            // Extract total cost correctly - remove '₹' symbol
            const totalCostText = document.getElementById('totalCost').textContent;
            const totalCost = parseFloat(totalCostText.replace('₹', ''));

            const bookingData = {
                vehicleId: currentVehicle.id,
                startDate,
                endDate,
                pickupLocation,
                notes,
                totalCost: totalCost
            };

            try {
                const result = await createBooking(bookingData);
                // Save booking to localStorage for persistence
                const bookings = JSON.parse(localStorage.getItem('userBookings') || '[]');
                bookings.push(result);
                localStorage.setItem('userBookings', JSON.stringify(bookings));
                
                showAlert('success', 'Booking confirmed successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'booking-history.html';
                }, 2000);
            } catch (error) {
                console.error('Booking error:', error);
                showAlert('danger', 'Failed to create booking. Please try again.');
            }
        }

        function showAlert(type, message) {
            const alert = document.getElementById('bookingAlert');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.classList.remove('d-none');
        }
    </script>
</body>
</html>
